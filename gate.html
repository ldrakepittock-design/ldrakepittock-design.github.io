<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected — Lauren Pittock</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="gate-body">

  <div class="gate-container">

    <a href="index.html" class="gate-back">← Back to work</a>

    <div class="gate-lock">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1 class="gate-title">Case Study</h1>
    <p class="gate-subtitle">This work is password protected.<br>Enter the password to continue.</p>

    <div class="gate-form">
      <input
        type="password"
        class="gate-input"
        id="passwordInput"
        placeholder="Enter password"
        autocomplete="off"
        autofocus
      />
      <p class="gate-error" id="gateError">Incorrect password. Please try again.</p>
      <button class="gate-btn" onclick="checkPassword()">View Case Study</button>
    </div>

  </div>

  <script>
    // ─── PASSWORD CONFIGURATION ───────────────────────────
    // Change "portfolio2024" to any password you'd like.
    const PASSWORD = "portfolio2024";

    // ─── CASE STUDY URL MAP ───────────────────────────────
    const CASE_STUDIES = {
      "banking-inbranch":   "case-banking-inbranch.html",
      "aviation-smb":       "case-aviation-smb.html",
      "fintech-onboarding": "case-fintech-onboarding.html",
      "diabetes-app":       "case-diabetes-app.html",
      "marketing-offers":   "case-marketing-offers.html",
    };

    // Get which case study to redirect to
    const params = new URLSearchParams(window.location.search);
    const caseKey = params.get("case");

    // If already authenticated this session, redirect immediately
    if (sessionStorage.getItem("lp_auth") === "true" && caseKey && CASE_STUDIES[caseKey]) {
      window.location.href = CASE_STUDIES[caseKey];
    }

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const error = document.getElementById("gateError");

      if (input === PASSWORD) {
        sessionStorage.setItem("lp_auth", "true");
        if (caseKey && CASE_STUDIES[caseKey]) {
          window.location.href = CASE_STUDIES[caseKey];
        } else {
          window.location.href = "index.html";
        }
      } else {
        error.classList.add("visible");
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").focus();
        setTimeout(() => error.classList.remove("visible"), 3000);
      }
    }

    // Allow Enter key
    document.getElementById("passwordInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPassword();
    });
  </script>

</body>
</html>
